<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>113年度金訴字第51號 判決書</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #1a56a0;
      --tag-bg: #eef3fb;
      --nav-bg: #1a2a3a;
      --nav-text: #e8edf2;
      --table-head: #f0f4fa;
      --hl: #ffe066;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Serif TC", "思源宋體", "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.9;
      font-size: 16px;
    }

    /* ── Top nav ── */
    #topnav {
      background: var(--nav-bg);
      color: var(--nav-text);
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 52px;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      overflow-x: auto;
      white-space: nowrap;
    }
    #topnav .site-title {
      font-size: 12px;
      color: #a0b8cc;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--nav-text);
      padding: 6px 12px;
      cursor: pointer;
      font-size: 13px;
      border-radius: 4px;
      transition: background .15s, color .15s;
      flex-shrink: 0;
    }
    .tab-btn:hover { background: rgba(255,255,255,.1); }
    .tab-btn.active { background: var(--accent); color: #fff; font-weight: 600; }

    /* Search button in nav */
    #search-btn {
      margin-left: auto;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: var(--nav-text);
      padding: 5px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      transition: background .15s;
    }
    #search-btn:hover { background: rgba(255,255,255,.2); }

    /* ── Search overlay ── */
    #search-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 200;
      padding: 60px 16px 16px;
      overflow-y: auto;
    }
    #search-overlay.open { display: block; }
    #search-box {
      max-width: 720px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
    }
    #search-input-row {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    #search-input-row svg { color: var(--muted); flex-shrink: 0; }
    #search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 18px;
      padding: 18px 0;
      font-family: inherit;
      color: var(--text);
      background: transparent;
    }
    #search-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 22px;
      color: var(--muted);
      padding: 4px;
      line-height: 1;
    }
    #search-status {
      padding: 10px 20px;
      font-size: 13px;
      color: var(--muted);
      min-height: 36px;
      border-bottom: 1px solid var(--border);
    }
    #search-results {
      max-height: 60vh;
      overflow-y: auto;
    }
    .result-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .result-item:hover { background: var(--tag-bg); }
    .result-source {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .06em;
      margin-bottom: 5px;
    }
    .result-snippet {
      font-size: 14px;
      line-height: 1.7;
      color: #333;
    }
    .result-snippet mark {
      background: var(--hl);
      color: #000;
      border-radius: 2px;
      padding: 0 2px;
    }
    #search-no-results {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }

    /* ── Layout ── */
    #wrapper {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px 80px;
    }

    /* ── Home panel ── */
    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 48px;
      margin-bottom: 32px;
    }
    .hero h1 {
      font-size: 1.5rem;
      color: var(--accent);
      line-height: 1.5;
      margin-bottom: 12px;
    }
    .hero .meta { color: var(--muted); font-size: 14px; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); border-color: var(--accent); }
    .card .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .card h3 { font-size: 15px; color: var(--accent); margin-bottom: 6px; }
    .card p { font-size: 13px; color: var(--muted); }

    /* ── Markdown content ── */
    .md-panel { display: none; }
    .md-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 48px 56px;
    }
    @media (max-width: 600px) {
      .md-body { padding: 24px 18px; }
      .hero { padding: 24px 20px; }
      #topnav .site-title { display: none; }
    }

    /* ── Heading hierarchy with indentation ── */
    .md-body h1 {
      font-size: 1.5rem; font-weight: 700;
      color: var(--accent);
      border-bottom: 3px solid var(--accent);
      padding-bottom: 10px;
      margin: 40px 0 18px;
    }
    .md-body h2 {
      font-size: 1.2rem; font-weight: 700;
      color: #fff;
      background: var(--accent);
      padding: 8px 16px;
      border-radius: 4px;
      margin: 36px 0 14px;
    }
    .md-body h3 {
      font-size: 1.05rem; font-weight: 700;
      color: var(--accent);
      border-left: 4px solid var(--accent);
      padding-left: 12px;
      margin: 28px 0 10px 0;
    }
    .md-body h4 {
      font-size: 1rem; font-weight: 600;
      color: #1a3a5c;
      border-left: 2px solid #90b4d8;
      padding-left: 10px;
      margin: 20px 0 8px 20px;
    }
    .md-body h5 {
      font-size: .95rem; font-weight: 600;
      color: #2a4a6a;
      padding-left: 8px;
      margin: 14px 0 6px 40px;
      opacity: .85;
    }
    .md-body h1:first-child { margin-top: 0; }
    .md-body p { margin-bottom: 14px; }
    .md-body ul, .md-body ol { padding-left: 24px; margin-bottom: 14px; }
    .md-body li { margin-bottom: 6px; }
    .md-body blockquote {
      border-left: 4px solid var(--accent);
      background: var(--tag-bg);
      margin: 16px 0;
      padding: 12px 20px;
      border-radius: 0 6px 6px 0;
      color: #2a2a2a;
      font-style: italic;
    }
    .md-body code { background: #f3f3f3; border-radius: 3px; padding: 2px 5px; font-family: monospace; font-size: .88em; }
    .md-body pre { background: #f3f3f3; border-radius: 6px; padding: 16px; overflow-x: auto; margin-bottom: 14px; }
    .md-body pre code { background: none; padding: 0; }
    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
    .md-body table { border-collapse: collapse; width: 100%; margin: 16px 0 24px; font-size: 14px; }
    .md-body th { background: var(--table-head); border: 1px solid var(--border); padding: 10px 14px; text-align: left; font-weight: 700; }
    .md-body td { border: 1px solid var(--border); padding: 9px 14px; vertical-align: top; }
    .md-body tr:nth-child(even) td { background: #f9fafc; }
    .md-body strong { color: #111; }

    /* search highlight inside rendered content */
    .md-body mark { background: var(--hl); border-radius: 2px; padding: 0 2px; }

    /* ── Loading ── */
    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }
    .loading::after {
      content: '';
      display: block;
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      margin: 16px auto 0;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOC floating panel ── */
    #toc-wrap {
      position: fixed;
      bottom: 24px;
      left: 20px;
      z-index: 150;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #toc-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--nav-bg);
      color: var(--nav-text);
      border: none;
      border-radius: 20px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 2px 10px rgba(0,0,0,.3);
      transition: background .15s;
    }
    #toc-toggle:hover { background: #2a3f55; }
    #toc-panel {
      display: none;
      position: absolute;
      bottom: 42px;
      left: 0;
      width: 280px;
      max-height: 60vh;
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      padding: 8px 0;
    }
    #toc-panel.open { display: block; }
    #toc-panel .toc-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--muted);
      padding: 6px 16px 8px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .toc-item {
      display: block;
      padding: 5px 16px;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      transition: background .1s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }
    .toc-item:hover { background: var(--tag-bg); color: var(--accent); }
    .toc-item.h2 { font-weight: 700; color: var(--accent); padding-left: 16px; }
    .toc-item.h3 { padding-left: 24px; }
    .toc-item.h4 { padding-left: 36px; font-size: 12px; color: var(--muted); }
    @media (max-width: 600px) {
      #toc-wrap { bottom: 16px; left: 12px; }
      #toc-panel { width: calc(100vw - 24px); }
    }

    /* ── Part nav ── */
    .part-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .part-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 18px;
      cursor: pointer;
      font-size: 13px;
      color: var(--accent);
      transition: background .15s, color .15s;
    }
    .part-nav button:hover, .part-nav button.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
  </style>
</head>
<body>

<nav id="topnav">
  <span class="site-title">113年度金訴字第51號</span>
  <button class="tab-btn active" data-target="home">首頁</button>
  <button class="tab-btn" data-target="judgment">判決書全文</button>
  <button class="tab-btn" data-target="analysis">案情分析</button>
  <button class="tab-btn" data-target="verdict">有罪理由</button>
  <button id="search-btn" onclick="openSearch()">🔍 搜尋</button>
</nav>

<!-- ══ SEARCH OVERLAY ══ -->
<div id="search-overlay" onclick="onOverlayClick(event)">
  <div id="search-box">
    <div id="search-input-row">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-input" type="search" placeholder="搜尋判決書全文…" autocomplete="off" oninput="onSearchInput(this.value)">
      <button id="search-close" onclick="closeSearch()">✕</button>
    </div>
    <div id="search-status">輸入關鍵字以搜尋所有文件</div>
    <div id="search-results"></div>
  </div>
</div>

<div id="wrapper">

  <!-- ══ HOME ══ -->
  <div id="home">
    <div class="hero">
      <h1>臺灣臺北地方法院刑事判決<br>113年度金訴字第51號</h1>
      <p class="meta">宣判日期：中華民國115年3月26日 ／ 被告：柯文哲</p>
    </div>
    <div class="card-grid">
      <div class="card" onclick="switchTab('judgment')">
        <div class="card-label">全文</div>
        <h3>判決書全文</h3>
        <p>原始判決書全文（共約 30 萬字）</p>
      </div>
      <div class="card" onclick="switchTab('analysis')">
        <div class="card-label">分析</div>
        <h3>京華城案完整分析</h3>
        <p>關鍵時間軸、容積率數字、核心爭點與人物速查</p>
      </div>
      <div class="card" onclick="switchTab('verdict')">
        <div class="card-label">判決</div>
        <h3>柯文哲有罪理由分析</h3>
        <p>收賄罪五大理由、圖利罪三大論點、辯解與法院回應</p>
      </div>
    </div>
  </div>

  <!-- ══ JUDGMENT ══ -->
  <div id="judgment" class="md-panel">
    <div id="judgment-body" class="md-body"><div class="loading">載入中</div></div>
  </div>

  <!-- ══ ANALYSIS ══ -->
  <div id="analysis" class="md-panel">
    <div id="analysis-body" class="md-body"><div class="loading">載入中</div></div>
  </div>

  <!-- ══ VERDICT ══ -->
  <div id="verdict" class="md-panel">
    <div id="verdict-body" class="md-body"><div class="loading">載入中</div></div>
  </div>

</div>

<!-- ══ TOC ══ -->
<div id="toc-wrap">
  <div id="toc-panel">
    <div class="toc-title">目錄</div>
    <div id="toc-list"></div>
  </div>
  <button id="toc-toggle" onclick="toggleToc()">☰ 目錄</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
marked.setOptions({ gfm: true, breaks: true });

// ── File registry ──
const FILES = [
  { key: 'jf', url: '判決書全文.md',          label: '判決書全文' },
  { key: 'an', url: '京華城案關鍵時間軸與爭點分析.md', label: '案情分析' },
  { key: 'vd', url: '柯文哲有罪理由分析.md',  label: '有罪理由' },
];

const cache = {};   // url → raw markdown text

async function fetchMd(url) {
  if (cache[url]) return cache[url];
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const text = await r.text();
  cache[url] = text;
  return text;
}

async function renderInto(containerId, url) {
  const el = document.getElementById(containerId);
  try {
    const md = await fetchMd(url);
    el.innerHTML = marked.parse(md);
  } catch (e) {
    el.innerHTML = '<p style="color:red">載入失敗：' + e.message + '</p>';
  }
}

// ── Tab switching ──
let currentTab = 'home';
let judgmentLoaded = false;
let analysisLoaded = false;
let verdictLoaded = false;

function switchTab(name) {
  document.getElementById(currentTab).style.display = 'none';
  currentTab = name;
  document.getElementById(name).style.display = 'block';
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.target === name));

  if (name === 'judgment' && !judgmentLoaded) {
    judgmentLoaded = true;
    loadFullJudgment();
  }
  if (name === 'analysis' && !analysisLoaded) {
    analysisLoaded = true;
    renderInto('analysis-body', '京華城案關鍵時間軸與爭點分析.md');
  }
  if (name === 'verdict' && !verdictLoaded) {
    verdictLoaded = true;
    renderInto('verdict-body', '柯文哲有罪理由分析.md');
  }
}

async function loadFullJudgment() {
  const body = document.getElementById('judgment-body');
  body.innerHTML = '<div class="loading">載入中（約 30 萬字，請稍候）</div>';
  try {
    const md = await fetchMd('判決書全文.md');
    body.innerHTML = marked.parse(md);
  } catch (e) {
    body.innerHTML = '<p style="color:red">載入失敗：' + e.message + '</p>';
  }
}

// Init
document.querySelectorAll('.md-panel').forEach(p => p.style.display = 'none');
document.getElementById('home').style.display = 'block';
document.querySelectorAll('.tab-btn').forEach(btn =>
  btn.addEventListener('click', () => switchTab(btn.dataset.target)));

// ══════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════

let searchIndex = null;   // Array of { label, url, paragraphs: string[] }
let searchTimer = null;

function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  document.getElementById('search-input').focus();
  if (!searchIndex) buildIndex();
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('search-overlay')) closeSearch();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearch();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
});

// Build index: fetch all files in background, split into paragraphs
async function buildIndex() {
  document.getElementById('search-status').textContent = '正在載入全文索引…';
  const index = [];
  await Promise.all(FILES.map(async f => {
    try {
      const md = await fetchMd(f.url);
      // Split into non-empty paragraphs (separated by blank lines)
      const paragraphs = md.split(/\n{2,}/)
        .map(p => p.trim())
        .filter(p => p.length > 10);
      index.push({ label: f.label, url: f.url, paragraphs });
    } catch(_) {}
  }));
  searchIndex = index;
  document.getElementById('search-status').textContent = '索引就緒，共 ' +
    searchIndex.reduce((s, f) => s + f.paragraphs.length, 0) + ' 個段落';
}

function onSearchInput(q) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => runSearch(q.trim()), 180);
}

function escapeRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, re) {
  return text.replace(re, m => '<mark>' + m + '</mark>');
}

function snippet(para, re, maxLen = 200) {
  // Find first match position, show surrounding context
  const m = re.exec(para);
  if (!m) return para.slice(0, maxLen);
  const start = Math.max(0, m.index - 60);
  const end = Math.min(para.length, m.index + maxLen - 60);
  let s = para.slice(start, end);
  if (start > 0) s = '…' + s;
  if (end < para.length) s = s + '…';
  return s;
}

function runSearch(q) {
  const status = document.getElementById('search-status');
  const results = document.getElementById('search-results');

  if (!q) {
    results.innerHTML = '';
    status.textContent = searchIndex
      ? '索引就緒，共 ' + searchIndex.reduce((s, f) => s + f.paragraphs.length, 0) + ' 個段落'
      : '正在載入全文索引…';
    return;
  }
  if (!searchIndex) {
    status.textContent = '索引尚未就緒，請稍候…';
    return;
  }

  const re = new RegExp(escapeRe(q), 'gi');
  const hits = [];

  for (const file of searchIndex) {
    for (const para of file.paragraphs) {
      if (re.test(para)) {
        re.lastIndex = 0;
        hits.push({ label: file.label, url: file.url, para });
        if (hits.length >= 50) break;
      }
      re.lastIndex = 0;
    }
    if (hits.length >= 50) break;
  }

  status.textContent = hits.length === 0
    ? '找不到結果'
    : `找到 ${hits.length} 個段落${hits.length === 50 ? '（顯示前 50 筆）' : ''}`;

  if (hits.length === 0) {
    results.innerHTML = '<div id="search-no-results">「' + q + '」在所有文件中找不到相關段落。</div>';
    return;
  }

  const re2 = new RegExp(escapeRe(q), 'gi');
  results.innerHTML = hits.map(h => {
    const snip = highlight(snippet(h.para, re2, 220), re2);
    re2.lastIndex = 0;
    return `<div class="result-item" onclick="goToResult('${h.url}', '${encodeURIComponent(q)}')">
      <div class="result-source">${h.label}</div>
      <div class="result-snippet">${snip}</div>
    </div>`;
  }).join('');
}

// Navigate to the file containing the result, then highlight
function goToResult(url, qEncoded) {
  closeSearch();
  const q = decodeURIComponent(qEncoded);

  // Map url to tab
  if (url.includes('判決書全文')) {
    switchTab('judgment');
    if (!judgmentLoaded) {
      judgmentLoaded = true;
      loadFullJudgment().then(() => highlightInBody('judgment-body', q));
    } else {
      waitAndHighlight('judgment-body', q);
    }
  } else if (url.includes('分析')) {
    switchTab('analysis');
    if (!analysisLoaded) {
      analysisLoaded = true;
      renderInto('analysis-body', url).then(() => highlightInBody('analysis-body', q));
    } else {
      highlightInBody('analysis-body', q);
    }
  } else {
    switchTab('verdict');
    if (!verdictLoaded) {
      verdictLoaded = true;
      renderInto('verdict-body', url).then(() => highlightInBody('verdict-body', q));
    } else {
      highlightInBody('verdict-body', q);
    }
  }
}

function waitAndHighlight(containerId, q) {
  const el = document.getElementById(containerId);
  const observer = new MutationObserver(() => {
    if (!el.querySelector('.loading')) {
      observer.disconnect();
      setTimeout(() => highlightInBody(containerId, q), 100);
    }
  });
  observer.observe(el, { childList: true, subtree: true });
}

// ══════════════════════════════════════════
//  TOC
// ══════════════════════════════════════════
let tocOpen = false;

function toggleToc() {
  tocOpen = !tocOpen;
  document.getElementById('toc-panel').classList.toggle('open', tocOpen);
  if (tocOpen) buildToc();
}

document.addEventListener('click', e => {
  const wrap = document.getElementById('toc-wrap');
  if (tocOpen && !wrap.contains(e.target)) {
    tocOpen = false;
    document.getElementById('toc-panel').classList.remove('open');
  }
});

function buildToc() {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';

  // Find active content panel
  const panelId = currentTab === 'home' ? null :
    currentTab === 'judgment' ? 'judgment-body' :
    currentTab === 'analysis' ? 'analysis-body' : 'verdict-body';

  if (!panelId) { list.innerHTML = '<div style="padding:12px 16px;color:#888;font-size:13px">請先開啟文件</div>'; return; }

  const panel = document.getElementById(panelId);
  const headings = panel.querySelectorAll('h1,h2,h3,h4');

  if (!headings.length) { list.innerHTML = '<div style="padding:12px 16px;color:#888;font-size:13px">目錄載入中…</div>'; return; }

  headings.forEach((h, i) => {
    // Assign id if missing
    if (!h.id) h.id = 'toc-h-' + i;
    const level = h.tagName.toLowerCase(); // h1/h2/h3/h4
    const cls = level === 'h1' ? 'h2' : level; // treat h1 as top-level in TOC
    const item = document.createElement('div');
    item.className = 'toc-item ' + cls;
    item.textContent = h.textContent.trim();
    item.onclick = () => {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      tocOpen = false;
      document.getElementById('toc-panel').classList.remove('open');
    };
    list.appendChild(item);
  });
}

function highlightInBody(containerId, q) {
  const body = document.getElementById(containerId);
  // Remove previous highlights
  body.querySelectorAll('mark').forEach(m => {
    m.replaceWith(document.createTextNode(m.textContent));
  });
  if (!q) return;

  // Walk text nodes and wrap matches
  const re = new RegExp(escapeRe(q), 'gi');
  const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  let firstMark = null;
  for (const node of nodes) {
    if (!re.test(node.textContent)) { re.lastIndex = 0; continue; }
    re.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = re.exec(node.textContent)) !== null) {
      frag.appendChild(document.createTextNode(node.textContent.slice(last, m.index)));
      const mark = document.createElement('mark');
      mark.textContent = m[0];
      frag.appendChild(mark);
      if (!firstMark) firstMark = mark;
      last = m.index + m[0].length;
    }
    frag.appendChild(document.createTextNode(node.textContent.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }

  if (firstMark) firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
}
